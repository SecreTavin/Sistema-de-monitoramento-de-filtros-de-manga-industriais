<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel SCADA | Monitoramento de Filtros</title>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            --status-ok: #10b981;
            --status-warn: #eab308;
            --status-crit: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            min-height: 100vh;
        }

        .header-title {
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        /* Layout em Grid para o Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card-industrial {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
        }

        .card-industrial h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Novo estilo para o campo de relatório */
        textarea.relatorio-input {
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button.btn-warning {
            background-color: var(--status-warn);
            color: #000;
        }
        button.btn-warning:hover {
            background-color: #ca8a04;
        }

        /* Estilização da Tabela de Inventário */
        .card-full-width {
            grid-column: 1 / -1; /* Ocupa a linha inteira */
        }

        .tabela-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 0.75rem;
            display: inline-block;
        }

        .obs-cell {
            max-width: 250px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Painel de Resultado em Tempo Real */
        #resultado {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .resultado-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .resultado-dado {
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 6px;
        }

        .resultado-avaria {
            grid-column: 1 / -1;
            background: rgba(0,0,0,0.2);
            padding: 1rem;
            border-radius: 6px;
            border-left: 3px solid var(--primary);
        }
    </style>
</head>
<body>

    <h1 class="header-title">Sistema de Supervisão de Ativos</h1>
    
    <div class="dashboard-grid">
        
        <!-- CARD 1: CADASTRAR -->
        <div class="card-industrial">
            <h2>➕ Cadastro de Novo Ativo</h2>
            <div class="form-group">
                <input type="number" id="cadId" placeholder="ID do Ativo (Ex: 611505)">
                <div class="form-row">
                    <input type="number" id="cadMangas" placeholder="Qtd. Mangas">
                    <input type="text" id="cadMaterial" placeholder="Material (Poliéster)">
                </div>
                <button onclick="cadastrarFiltro()">Salvar Ativo no Sistema</button>
            </div>
        </div>

        <!-- CARD 2: INSPEÇÃO (NOVA FUNÇÃO AQUI) -->
        <div class="card-industrial">
            <h2>📝 Lançamento de Inspeção de Campo</h2>
            <div class="form-group">
                <div class="form-row">
                    <input type="number" id="updId" placeholder="ID do Filtro (Ex: 611505)">
                    <input type="date" id="updData" title="Data da Manutenção">
                </div>
                <input type="number" step="0.1" id="updDeltap" placeholder="Pressão Delta P (mmH2O)">
                
                <!-- NOVA FUNÇÃO: Campo de texto para avarias -->
                <textarea id="updObservacoes" class="relatorio-input" placeholder="Relatório de avarias (Ex: Manga furada, gaiola torta, vazamento na válvula pulse jet...)"></textarea>
                
                <button class="btn-warning" onclick="atualizarDados()">Registrar Inspeção</button>
            </div>
        </div>

        <!-- CARD 3: MONITORAMENTO -->
        <div class="card-industrial">
            <h2>🔍 Diagnóstico em Tempo Real</h2>
            <div class="form-group">
                <div class="form-row">
                    <input type="number" id="idFiltro" placeholder="Digite o ID para consultar">
                    <button onclick="chamarPython()">Analisar</button>
                </div>
            </div>

            <div id="resultado">
                <p style="color: var(--text-muted); text-align: center;">Insira um ID e clique em analisar para buscar os dados telemétricos.</p>
            </div>
        </div>

        <!-- CARD 4: INVENTÁRIO (FULL WIDTH) -->
        <div class="card-industrial card-full-width">
            <h2>📋 Inventário Geral da Planta</h2>
            <div id="tabelaInventario" class="tabela-container">
                <p style="text-align: center; color: var(--text-muted);">Sincronizando com o banco de dados...</p>
            </div>
        </div>

    </div>

    <script>
        // Função para monitorar o status (Atualizada para mostrar o relatório)
        async function chamarPython() {
            const id = document.getElementById('idFiltro').value;
            const campoResultado = document.getElementById('resultado');
            if (!id) return;

            try {
                const resposta = await fetch(`/api/analisar/${id}`);
                const dados = await resposta.json();

                if (dados.erro || !resposta.ok) {
                    campoResultado.innerHTML = `<p style="color: var(--status-crit);">⚠️ ${dados.erro || dados.mensagem}</p>`;
                    campoResultado.style.borderColor = 'var(--status-crit)';
                } else {
                    let corStatus = 'var(--status-ok)';
                    if (dados.status === 'CRÍTICO') corStatus = 'var(--status-crit)';
                    if (dados.status === 'ATENÇÃO') corStatus = 'var(--status-warn)';

                    // Renderização aprimorada do card de resultado
                    campoResultado.innerHTML = `
                        <h3 style="margin-bottom: 10px; color: white;">Ativo ID: ${dados.id}</h3>
                        <div style="margin-bottom: 10px;">
                            <span class="status-badge" style="background-color: ${corStatus}; color: ${dados.status === 'ATENÇÃO' ? '#000' : '#fff'};">
                                ${dados.status}
                            </span>
                        </div>
                        <div class="resultado-grid">
                            <div class="resultado-dado">
                                <small style="color: var(--text-muted);">Pressão Delta P</small>
                                <p style="font-size: 1.2rem; font-weight: bold;">${dados.deltap} mmH2O</p>
                            </div>
                            <div class="resultado-dado">
                                <small style="color: var(--text-muted);">Mensagem do Sistema</small>
                                <p style="font-size: 0.9rem;">${dados.mensagem.split(',')[0]}</p>
                            </div>
                            <!-- NOVA FUNÇÃO: Exibição da Avaria -->
                            <div class="resultado-avaria">
                                <small style="color: var(--text-muted);">📋 Último Relatório de Avarias</small>
                                <p style="margin-top: 5px; line-height: 1.4;">${dados.observacoes || "Nenhuma avaria registrada."}</p>
                            </div>
                        </div>
                    `;
                    campoResultado.style.borderColor = corStatus;
                }
            } catch (erro) {
                console.error("Erro:", erro);
            }
        }

        // Função para cadastrar novo ativo
        async function cadastrarFiltro() {
            const id = document.getElementById('cadId').value;
            if(!id) { alert("O ID é obrigatório!"); return; }

            const dados = {
                id: id,
                quantidade_mangas: document.getElementById('cadMangas').value || 0,
                material_manga: document.getElementById('cadMaterial').value || 'Não especificado'
            };

            const resposta = await fetch('/api/cadastrar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            const result = await resposta.json();
            alert(result.mensagem || result.erro);
            carregarInventario();
        }

        // NOVA FUNÇÃO: Atualizada para capturar as avarias
        async function atualizarDados() {
            const id = document.getElementById('updId').value;
            if(!id) { alert("Informe o ID do filtro para registrar a inspeção."); return; }

            const dados = {
                id: id,
                deltap: document.getElementById('updDeltap').value,
                manutencao: document.getElementById('updData').value,
                observacoes: document.getElementById('updObservacoes').value // Captura a string
            };

            const resposta = await fetch('/api/atualizar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(dados)
            });
            const result = await resposta.json();
            alert(result.mensagem || result.erro);
            
            // Limpa o formulário e recarrega os painéis
            document.getElementById('updObservacoes').value = ''; 
            document.getElementById('updDeltap').value = '';
            
            if(document.getElementById('idFiltro').value == id){
                chamarPython(); 
            }
            carregarInventario();
        }

        // Função para carregar o inventário
        async function carregarInventario() {
            const container = document.getElementById('tabelaInventario');
            
            try {
                const resposta = await fetch('/api/historico/');
                const filtros = await resposta.json();

                if (filtros.length === 0) {
                    container.innerHTML = "<p style='text-align:center;'>Nenhum ativo localizado no banco de dados.</p>";
                    return;
                }

                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>TAG / ID</th>
                                <th>Status Atual</th>
                                <th>Pressão (mmH2O)</th>
                                <th>Última Manutenção</th>
                                <th>Relatório de Avarias</th> <!-- Nova Coluna -->
                            </tr>
                        </thead>
                        <tbody>`;

                filtros.forEach(f => {
                    let corFundo = 'var(--status-ok)';
                    let corTexto = 'white';

                    if (f.status === 'CRÍTICO') { corFundo = 'var(--status-crit)'; } 
                    else if (f.status === 'ATENÇÃO') { corFundo = 'var(--status-warn)'; corTexto = 'black'; }

                    // Trata string vazia
                    let obs = f.observacoes ? f.observacoes : '-';

                    html += `
                        <tr>
                            <td style="font-weight: bold;">${f.id}</td>
                            <td>
                                <span class="status-badge" style="background-color: ${corFundo}; color: ${corTexto};">
                                    ${f.status}
                                </span>
                            </td>
                            <td>${f.deltap}</td>
                            <td>${f.ultima_manutencao}</td>
                            <td class="obs-cell" title="${obs}">${obs}</td>
                        </tr>`;
                });

                html += '</tbody></table>';
                container.innerHTML = html;

            } catch (erro) {
                console.error("Erro ao carregar inventário:", erro);
                container.innerHTML = "<p style='color: var(--status-crit);'>Erro de conexão com o servidor.</p>";
            }
        }

        window.onload = () => {
            carregarInventario();
            // Atualiza os dados a cada 10 segundos para não sobrecarregar
            setInterval(carregarInventario, 10000); 
        };
    </script>
</body>
</html>
